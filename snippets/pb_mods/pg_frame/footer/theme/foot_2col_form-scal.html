                <h5><cms:show ccs_ftr_frm_nws_hd /></h5>

                <cms:form method="post" anchor='0'>
    
					<cms:if k_success>

						<cms:set is_duplicate='0' scope='global' />
						<cms:pages masterpage='subscribers.php' custom_field="subscriber_email==<cms:show frm_email />" limit='1'>
							<cms:set is_duplicate='1' scope='global' />
						</cms:pages>

						<cms:if is_duplicate>
							<cms:set success_msg="1" scope="global" />
						<cms:else />
							<cms:db_persist
								_masterpage='subscribers.php'
								_mode='create'
								_auto_title='1'
								k_page_title=frm_email
								subscriber_email=frm_email
							/>

							<cms:if k_error>
								<div class="text-danger fs-9 mt-2"><cms:show ccs_ftr_frm_nws_msg_err /></div>
							<cms:else />
								<cms:send_mail 
									from="<cms:get_field 'ccs_gl_site_email' masterpage='globals.php' />" 
									to=frm_email 
									subject="Thank you for subscribing!"
								>
									Hello!

									Thank you for subscribing to the <cms:get_field 'ccs_gl_site_name' masterpage='globals.php' /> newsletter. 

									You are now on the list for our latest updates and promotions.
								</cms:send_mail>

								<cms:set success_msg="1" scope="global" />
							</cms:if>
						</cms:if>
					</cms:if>

					<cms:if success_msg>
						<div class="alert alert-success bg-success text-white border-0 fs-9 py-2 mt-2">
							<cms:show ccs_ftr_frm_nws_msg_ok />
						</div>
					<cms:else />
						<div class="input-group">
							<cms:input class="form-control bg-white" type="text" name="email" placeholder="<cms:show ccs_ftr_frm_nws_plh />" aria-label="Email address for newsletter" required='1' validator='email' />
							<button class="btn btn-<cms:show ccs_ftr_frm_nws_btn_clr />" type="submit"><cms:show ccs_ftr_frm_nws_btn /></button>
						</div>

						<cms:if k_error_email>

						</cms:if>
					</cms:if>
