<section class="bg-<cms:show ccs_ubr_shop_bg_clr_opt /> py-0 text-<cms:show ccs_ubr_shop_txt_clr /> <cms:show ccs_ubr_shop_dspr /> <cms:if ccs_ubr_shop_stky>sticky-top top-0 start-0 z-3</cms:if>" aria-label="E-Commerce and Account Links">
    
    <cms:if ccs_gl_edt_ok>
        <div class="container-fluid pt-2">
            <cms:popup_edit 'ccs_ubr_shop_gen_grp|ccs_ubr_shop_init_msg|ccs_ubr_shop_gen_row|ccs_ubr_shop_bg_clr_opt|ccs_ubr_shop_txt_clr|ccs_ubr_shop_dspr|ccs_ubr_shop_stky_row|ccs_ubr_shop_stky_msg|ccs_ubr_shop_stky' link_text="<span class='bg-800 link-warning'>| [EDIT SHOP BAR] |</span>" />
            <cms:popup_edit 'ccs_ubr_shop_sc1_grp|ccs_ubr_shop_sc1_msg|ccs_ubr_shop_sc1_rpt' link_text="<span class='bg-800 link-warning'>| [EDIT LEFT LINKS] |</span>" />
            <cms:popup_edit 'ccs_ubr_shop_sc2_grp|ccs_ubr_shop_sc2_msg|ccs_ubr_shop_portal_row|ccs_ubr_shop_auth_txt|ccs_ubr_shop_auth_lnk|ccs_ubr_shop_auth_cst|ccs_ubr_shop_sys_icons|ccs_ubr_shop_icn_profile|ccs_ubr_shop_icn_wishlist|ccs_ubr_shop_icn_cart' link_text="<span class='bg-800 link-warning'>| [EDIT ICONS &amp; PORTAL] |</span>" />
        </div>
    </cms:if>
    
    <div class="container">
        <div class="row align-items-center">
            
            <div class="col-sm-6 text-center text-sm-start ms-lg-n2"> 
                <cms:show_repeatable 'ccs_ubr_shop_sc1_rpt'>
                    
                    <cms:set final_sc1_tgt='' scope="global" />
                    <cms:set final_sc1_icon="" scope="global" />
                    
                    <cms:if ccs_ubr_shop_sc1_lnk == 'custom'>
                        <cms:set final_sc1_lnk="<cms:show ccs_ubr_shop_sc1_cst />" scope="global" />
                        <cms:set final_sc1_tgt='target="_blank"' scope="global" />
                        <cms:set final_sc1_icon="<i class='fa-solid fa-arrow-up-right-from-square ms-1' style='font-size: 0.75em;' aria-hidden='true'></i>" scope="global" />
                    <cms:else />
                        <cms:set final_sc1_lnk="<cms:show ccs_ubr_shop_sc1_lnk />" scope="global" />
                    </cms:if>

                    <a class="btn btn-link btn-sm px-2 link-<cms:show ccs_ubr_shop_txt_clr />" href="<cms:show final_sc1_lnk />" <cms:show final_sc1_tgt />>
                        <cms:if ccs_ubr_shop_sc1_icn><span class="<cms:show ccs_ubr_shop_sc1_icn /> pe-1" aria-hidden="true"></span></cms:if>
                        <cms:show ccs_ubr_shop_sc1_ttl /> <cms:show final_sc1_icon />
                    </a>
                </cms:show_repeatable>
            </div>
            
            <div class="col-sm-6 text-center text-sm-end pe-lg-2"> 
                
                <cms:set final_auth_tgt='' scope="global" />
                <cms:set final_auth_icon="" scope="global" />
                
                <cms:if ccs_ubr_shop_auth_lnk == 'custom'>
                    <cms:set final_auth_lnk="<cms:show ccs_ubr_shop_auth_cst />" scope="global" />
                    <cms:set final_auth_tgt='target="_blank"' scope="global" />
                    <cms:set final_auth_icon="<i class='fa-solid fa-arrow-up-right-from-square ms-1' style='font-size: 0.75em;' aria-hidden='true'></i>" scope="global" />
                <cms:else />
                    <cms:set final_auth_lnk="<cms:show ccs_ubr_shop_auth_lnk />" scope="global" />
                </cms:if>

                <a class="btn btn-link btn-sm px-2 link-<cms:show ccs_ubr_shop_txt_clr />" href="<cms:show final_auth_lnk />" <cms:show final_auth_tgt />> 
                    <cms:show ccs_ubr_shop_auth_txt /> <cms:show final_auth_icon />
                </a>
                
                <a class="btn btn-link btn-sm px-2 link-<cms:show ccs_ubr_shop_txt_clr />" href="#!">
                    <span class="fw-bolder fs-9 <cms:show ccs_ubr_shop_icn_profile />" aria-hidden="true"></span>
                    <span class="visually-hidden">Profile</span>
                </a>
                <a class="btn btn-link btn-sm px-2 link-<cms:show ccs_ubr_shop_txt_clr />" href="#!">
                    <span class="fw-bolder fs-9 <cms:show ccs_ubr_shop_icn_wishlist />" aria-hidden="true"></span>
                    <span class="visually-hidden">Wishlist</span>
                    <span class="d-inline-block ps-1">3</span>
                </a>
                <a class="btn btn-link btn-sm px-2 link-<cms:show ccs_ubr_shop_txt_clr /> pe-md-0" href="#!">
                    <span class="fw-bolder fs-9 <cms:show ccs_ubr_shop_icn_cart />" aria-hidden="true"></span>
                    <span class="visually-hidden">Cart</span>
                    <span class="d-inline-block ps-1">2</span>
                </a>
                
            </div>
            
        </div>
    </div>
</section>
