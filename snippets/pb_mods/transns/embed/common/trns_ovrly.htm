<cms:func _into='ovrly_chc' bg_clr_opt='' ovrly_clr_opt=''>
    <cms:if bg_clr_opt=="img" && ovrly_clr_opt=="gradient" >
        show
    <cms:else />
        hide
    </cms:if>
</cms:func>
<cms:editable type='group' name='trns_ovrly_grp' label='Image Color Overlay' not_active=ovrly_chc order='23' >
    <cms:editable type='message' name='trns_ovrly_clr_cstm_msg' order='2'>
        <h2>Custom Image Overlay Color</h2>
        <h3>IMPORTANT: Page can only have one image overlay set. Page will cascade the last image overlay set to any image on the page with an overlay set.</h3>
        <h4>These colors will cover any image. Set Transparancy below 100% To Reveal any Image</h4>
    </cms:editable>
    <cms:editable name='ovrly_clr_cstm_grdt_opt_row' type='row' order='5'>
        <cms:editable type='dropdown' name='ovrly_clr_grdt_opt' label='Image Overlay' desc=''
            opt_values='Solid=0|Gradient=1' 
            class='col-md-3'  
            order='2'
        />
        <cms:func _into='ovrly_clr_grdt_chc' ovrly_clr_grdt_opt=''>
            <cms:if ovrly_clr_grdt_opt="1" >
                show
            <cms:else />
                hide
            </cms:if>
        </cms:func> 
    </cms:editable>
    <cms:editable name='trns_ovrly_cstm_row' type='row' order='10'>
        <cms:editable type='color'
            name='ovrly_clr_cstm_one'
            label='Color 1'
            desc='Solid Color or First of Gradient'
            color='#000000'
            alpha='1'
            width='50%'
            height='100px'
            class='col-md-6'
            order='2'
        >#00000000</cms:editable>
        <cms:editable type='color'
            name='ovrly_clr_cstm_two'
            label='Color 2'
            desc='Second Color of Gradient - Ramp'
            color='#000000'
            alpha='1'
            width='50%'
            height='100px'
            class='col-md-6'
            not_active=ovrly_clr_grdt_chc
            order='4' 
        >#00000000</cms:editable>
        <cms:editable type='dropdown'  name='ovrly_cust_grad_split_opt' label='Gradient Split Style' desc='vision division of gradient'
            opt_values='dropdowns/gradient-split.htm'
            dynamic='opt_values'
            separator='@'
            class='col-md-3'
            not_active=ovrly_clr_grdt_chc 
            order='6'
        />
        <cms:editable type='checkbox' name='ovrly_clr_cstm_grdt_rvrs_opt' label='Reverse Overlay Gradient Colors' 
            opt_values='Swap=1' 
            class='col-md-3' 
            not_active=ovrly_clr_grdt_chc  
            order='8'
        />
    </cms:editable>
</cms:editable>
