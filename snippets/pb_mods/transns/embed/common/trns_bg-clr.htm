<cms:editable type='group' name='bg_clr_cstm_grp' label='Background Custom Color or Gradient' not_active=bg_clr_chc order='6' >
    <cms:editable type='message' name='bg_clr_cstm_msg' order='2'>
        <h2>Custom Background Color</h2><h4>These colors will cover the background image and overlay colors. Use Transparancy as needed to see the images.</h4>
    </cms:editable>
    <cms:editable type='row' name='bg_clr_cstm_grdt_opt_row'  order='5'>
        <cms:editable type='dropdown' name='bg_clr_cstm_grdt_opt' label='Solid or Gradient Color' desc=''
            opt_values='Solid= |Gradient=1' 
            class='col-md-3'  
            order='2'
        />
        <cms:func _into='bg_clr_cstm_grdt_chc' bg_clr_cstm_grdt_opt=''>
            <cms:if bg_clr_cstm_grdt_opt="1" >
                show
            <cms:else />
                hide
            </cms:if>
        </cms:func> 
    </cms:editable>
    <cms:editable name='bg_clr_cstm_row' type='row' order='10'>
        <cms:editable type='color' name='bg_clr_cstm_one' label='Color 1' desc='Solid Color or First of Gradient'
            color='#000000'
            alpha='1'
            width='50%'
            height='100px'
            class='col-md-6'
            order='2'
        >#00000000</cms:editable>
        <cms:editable type='color' name='bg_clr_cstm_two' label='Color 2' desc='Second Color of Gradient - Ramp'
            color='#000000'
            alpha='1'
            width='50%'
            height='100px'
            class='col-md-6'
            not_active=bg_clr_cstm_grdt_chc 
            order='4' 
        >#00000000</cms:editable>
        <cms:editable type='dropdown'  name='bg_clr_cust_grad_split_opt' label='Gradient Split Style' desc='vision division of gradient'
            opt_values='dropdowns/gradient-split.htm'
            dynamic='opt_values'
            separator='@'
            class='col-md-4'
            not_active=bg_clr_cstm_grdt_chc 
            order='6'
        />
        <cms:editable type='checkbox' name='bg_clr_cstm_grad_rvrs_opt' label='Reverse Background Gradient Colors' 
            opt_values='Swap=1' 
            class='col-md-3' 
            not_active=bg_clr_cstm_grdt_chc  
            order='8'
        />
    </cms:editable>
</cms:editable>
