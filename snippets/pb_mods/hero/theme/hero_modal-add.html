<cms:if ccs_hro_mdl_add_opt='2' >
    <cms:if ccs_hro_mdl_vid_src_opt='2' >
        <a class="bg-video video-modal d-block mt-<cms:show ccs_hro_add_vid_btn_mgn /> py-2" href="#!" data-bigPicture='{"vimeoSrc":"<cms:show ccs_hro_mdl_vim_id />"}' aria-label="Play Vimeo Video">
            <img src="<cms:show k_site_link />assets/images/icons/icon-play<cms:show ccs_hro_add_vid_btn_clr />.svg" alt="" width="80" />
        </a>
    <cms:else_if ccs_hro_mdl_vid_src_opt='1' />
        <a class="bg-video video-modal d-block mt-<cms:show ccs_hro_add_vid_btn_mgn /> py-2" href="#!" data-bigPicture='{"ytSrc":"<cms:show ccs_hro_mdl_ytb_id />"}' aria-label="Play YouTube Video">
            <img src="<cms:show k_site_link />assets/images/icons/icon-play<cms:show ccs_hro_add_vid_btn_clr />.svg" alt="" width="80" />
        </a>
    <cms:else />
        <a class="bg-video video-modal d-block mt-<cms:show ccs_hro_add_vid_btn_mgn /> py-2" href="#!" data-bigPicture='{"vidSrc":"<cms:show ccs_hro_mdl_vid_upl_vid_mp4 />"}' aria-label="Play Uploaded Video">
            <img src="<cms:show k_site_link />assets/images/icons/icon-play<cms:show ccs_hro_add_vid_btn_clr />.svg" alt="" width="80" />
        </a>
    </cms:if>

<cms:else_if ccs_hro_mdl_add_opt='1' /> 
    <a class="bg-video video-modal d-block mt-<cms:show ccs_hro_add_vid_btn_mgn /> py-2" href="#!" data-bs-toggle="modal" data-bs-target="#galleryModal" aria-label="Open Photo Gallery">
        <img src="<cms:show k_site_link />assets/images/icons/icon-play<cms:show ccs_hro_add_vid_btn_clr />.svg" alt="" width="80" />
    </a>

    <div class="modal fade fade-in" id="galleryModal" tabindex="-1" role="dialog" aria-labelledby="galleryModalLabel" aria-hidden="true">
         <div class="modal-dialog modal-xl" role="document">
             <div class="modal-content"> 
                <div class="modal-header"> 
                    <h5 class="modal-title" id="galleryLabel"></h5>
                    <button class="btn-close" type="button" data-bs-dismiss="modal" aria-label="Close Gallery"><span class="fw-light" aria-hidden="true">&times;</span></button>
                </div> 
                <div class="modal-body"> 
                    <div class="swiper-theme-container swiper-slider" data-swiper-theme-container="data-swiper-theme-container">
                        <div class="swiper" data-swiper='{"autoplay":true,"spaceBetween":5,"loop":true,"loopedSlides":5,"slideToClickedSlide":true}'>
                            <div class="swiper-wrapper">
                                <cms:show_repeatable 'ccs_hro_mdl_img_rpt' >
                                    <div class="swiper-slide">
                                        <img class="w-100 h-100 object-fit-cover" src="<cms:show ccs_hro_mdl_img_gal_img />" alt="<cms:show ccs_hro_mdl_img_gal_img_alt />" />
                                    </div>
                                </cms:show_repeatable>                            
                            </div>
                            <div class="swiper-nav">
                              <div class="swiper-button-next" aria-label="Next Slide"></div>
                              <div class="swiper-button-prev" aria-label="Previous Slide"></div>
                            </div>
                      </div>
                    </div>
                </div>
            </div> 
        </div>
    </div>   
</cms:if>
